{% extends "base.html" %}
{% block content %}

<div class="container">
    <h2>❤️ Heart Disease Prediction</h2>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <label>Age</label>
        <input type="number" name="age" min="1" max="120" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Heart Rate</label>
        <input type="number" name="heart_rate" min="40" max="200" required>

        <label>Systolic BP</label>
        <input type="number" name="sbp" min="80" max="200" required>

        <label>Diastolic BP</label>
        <input type="number" name="dbp" min="40" max="150" required>

        <label>Blood Sugar</label>
        <input type="number" step="0.1" name="blood_sugar" required>

        <label>CK-MB</label>
        <input type="number" step="0.1" name="ck_mb" required>

        <label>Troponin</label>
        <input type="number" step="0.01" name="troponin" required>

        <button type="submit">🔍 Predict Now</button>
    </form>
</div>

{% endblock %}
